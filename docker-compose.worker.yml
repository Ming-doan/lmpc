services:
  worker:
    build: ./worker
    environment:
      LMPC_API_URL: ${LMPC_API_URL}
      LMPC_WORKER_NAME: ${HOSTNAME:-worker}
      LMPC_PLATFORMS: ${LMPC_PLATFORMS:-stub}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.cache/huggingface:/root/.cache/huggingface
      - ~/.ollama:/root/.ollama
      - ./worker-data:/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
