version: "3.9"

networks:
  llmbench_net:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-llmbench}
      POSTGRES_USER: ${POSTGRES_USER:-llmbench}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-llmbench}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-llmbench}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - llmbench_net

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - llmbench_net

  api:
    build: ./apps/api
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-llmbench}:${POSTGRES_PASSWORD:-llmbench}@postgres:5432/${POSTGRES_DB:-llmbench}
      REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - llmbench_net

  worker:
    build: ./apps/worker
    env_file: .env
    environment:
      API_URL: http://api:8000
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      api:
        condition: service_healthy
    networks:
      - llmbench_net

  web:
    build: ./apps/web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - llmbench_net

volumes:
  pgdata:
