services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_PASSWORD: lmpc
      POSTGRES_DB: lmpc
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:lmpc@db:5432/lmpc
      APP_TOKEN: ${APP_TOKEN:-dev-token}
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me}
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
      LOG_LEVEL: INFO
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8080
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db-data:
